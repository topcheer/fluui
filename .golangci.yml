# golangci-lint v2 configuration for Fluui
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
    - unconvert

  settings:
    gocyclo:
      min-complexity: 50

  exclusions:
    rules:
      - path: _test\.go
        linters: [all]
      - path: cmd/|examples/
        linters: [all]
      - path: theme/builtin\.go
        linters: [all]
      - path: markdown/renderer\.go
        text: "SA1019.*deprecated"
        linters: [staticcheck]
      - path: compat/
        linters: [all]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
